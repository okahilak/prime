# PRIME: Population-level model for Real-time Individualized prediction of
# Motor Evoked potentials.
#
# Usage:
#   python train.py --cv -c configs/prime.yaml
#   python train.py --train-all -c configs/prime.yaml
#   python train.py --train 21 22 24 -c configs/prime.yaml
#   python train.py --test 21 22 24 -c configs/prime.yaml
#
# --train-all writes to results/train/ (pretrained_all.pt + global_backrotation_all.npy)
# --train     writes to results/train/ (pretrained.pt + global_backrotation.npy)
# --test      reads from results/train/, writes to results/test/
# --cv        writes to results/cv/
#
# Override any value via CLI: python train.py --cv -c configs/prime.yaml lr_pretrain=0.001

# --- Data ---
data_root: "data/processed"
base_output_dir: "results"

# --- Phase 1: population pretraining ---
pretrain_epochs: 100
batch_size_pretrain: 64
lr_pretrain: 0.0003
optimizer_type_pretrain: "AdamW"
weight_decay_pretrain: 0.0

# --- Phase 2: subject-specific calibration (first 100 trials) ---
num_calibration_trials: 100
calibration_epochs: 50
lr_calibration: 0.0001

# --- Phase 3: online continual full finetuning ---
finetune_mode: "full"
finetune_epochs: 1
finetune_warmup_trials: 50
batch_size_finetune: 50
lr_finetune: 0.0001
optimizer_type_finetune: "AdamW"
weight_decay_finetune: 0.0

# --- Sampling rates (Hz) ---
raw_sfreq: 5000        # incoming EEG from the acquisition pipeline
processed_sfreq: 1000  # after online preprocessing resampling (model input)

# --- Calibration window (covers ICA, QC, and post-stimulus windows) ---
calibration_tmin: -1.1
calibration_tmax: 0.100

# --- ICA window ---
ica_tmin: -1.1
ica_tmax: -0.005

# --- Post-stimulus window ---
post_tmin: -0.030
post_tmax: 0.100

# --- Pre-stim quality control window ---
qc_tmin: -0.200
qc_tmax: -0.010

# --- Model window ---
model_tmin: -0.060
model_tmax: -0.015

# --- Dipole search window ---
dipole_tmin: 0.038
dipole_tmax: 0.050

# --- Filtering ---
fmin: null
fmax: null
resample: null

# --- Euclidean alignment + back-rotation ---
use_tta: true
alignment_type: "euclidean"
use_backrotation: true
alignment_ref_ema_beta: 0.99
tta_cov_buffer_size: 50
alignment_cov_epsilon: 1.0e-06
alignment_transform_epsilon: 1.0e-07
use_adabn: false

# --- General ---
window_size: 100
seed: 42
device: "cuda"
no_pretrain: false
pretrained_checkpoint_dir: null

# --- Output ---
save_results: true
save_predictions_and_labels: true
save_checkpoints: false
save_finetuned_model: true
