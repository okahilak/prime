name: "PRIME-TEP Evaluation"
description: >
  PRIME post-intervention evaluation: a single block of 100 single pulses.
  The operator starts this protocol manually at each post-intervention time
  point (0, 15, 30, 60 min). Each run writes to its own trials CSV.

safety:
  minimum_trial_interval: 2.5   # minimum seconds between consecutive trials

runtime_parameters:
  is_open_loop_session:
    label: Open-loop session
    type: bool

  single_pulse_intensity:
    label: Single pulse intensity
    type: float
    unit: "% MSO"
    min: 0
    max: 100

  tbs_intensity:
    label: TBS intensity
    type: float
    unit: "% MSO"
    min: 0
    max: 100

  mock_tms_device:
    label: Mock TMS device
    type: bool

  overwrite_existing_results:
    label: Overwrite existing results
    type: bool

stages:
  # --- Evaluation stage ---
  - stage:
      name: "evaluation"
      trials: 100
      notes: "Post-intervention evaluation: 100 single pulses."
