name: "PRIME-TEP Intervention"
description: >
  PRIME high-excitability protocol: calibration (100 brain-state-independent
  trials) and application (4 × 200 trials).

safety:
  minimum_trial_interval: 2.5   # minimum seconds between consecutive trials

runtime_parameters:
  is_open_loop_session:
    label: Open-loop session
    type: bool

  single_pulse_intensity:
    label: Single pulse intensity
    type: float
    unit: "% MSO"
    min: 0
    max: 100

  tbs_intensity:
    label: TBS intensity
    type: float
    unit: "% MSO"
    min: 0
    max: 100

  mock_tms_device:
    label: Mock TMS device
    type: bool

  overwrite_existing_results:
    label: Overwrite existing results
    type: bool

stages:
  # --- Calibration stage ---
  - stage:
      name: "calibration"
      trials: 125
      notes: "Brain-state-independent calibration. Goal: 100 valid trials."

  # --- Calibration task ---
  - task:
      name: "calibrate_prime"
      notes: "Offline model calibration"

  # --- Rest ---
  - rest:
      wait_until:
        anchor: "calibrate_prime"
        offset: 60.0
      notes: "Wait 60s after the beginning of the calibration task"

  # --- Intervention stage (4 blocks × 200 trials) ---
  - stage:
      name: "intervention_block_1"
      trials: 200
      notes: "Intervention block 1"

  - rest:
      duration: 60.0

  - stage:
      name: "intervention_block_2"
      trials: 200
      notes: "Intervention block 2"

  - rest:
      duration: 60.0

  - stage:
      name: "intervention_block_3"
      trials: 200
      notes: "Intervention block 3"

  - rest:
      duration: 60.0

  - stage:
      name: "intervention_block_4"
      trials: 200
      notes: "Intervention block 4"
